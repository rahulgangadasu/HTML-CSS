<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
    <link rel="stylesheet" href="../CSS/forms-styles.css" />
  </head>
  <body>
    <form action="">
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" class="form-control" />
      </div>
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" class="form-control" />
      </div>
      <button type="submit">Register</button>
      <button type="reset">Clear</button>
      <div class="textfields">
        <input
          type="text"
          value="rahul"
          placeholder="name"
          autofocus
          maxlength="15"
        />
        <input
          class="datalist"
          type="text"
          list="countries"
          placeholder="country"
          autocomplete="off"
        />
        <datalist id="countries">
          <option data-value="India">India</option>
          <option data-value="USA">USA</option>
          <option data-value="Canada">Canada</option>
          <option data-value="Mexico">Mexico</option>
          <option data-value="Australia">Australia</option>
        </datalist>
      </div>
      <textarea cols="30" rows="5" placeholder="comments..."></textarea>
      <div>
        <select>
          <option value=""></option>
          <optgroup label="Countries">
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="Canada">Canada</option>
            <option value="Mexico">Mexico</option>
            <option value="Australia">Australia</option>
          </optgroup>
          <optgroup label="Continents">
            <option value="Asia">Asia</option>
            <option value="North America">North America</option>
            <option value="South America">South America</option>
            <option value="Europe">Europe</option>
            <option value="Africa">Africa</option>
          </optgroup>
        </select>
      </div>
      <div class="checkbox">
        Software Developer Roles: <br />
        <input type="checkbox" id="front-end" />
        <label class="label-inline" for="front-end">Front-end Developer</label>
      </div>
      <div class="checkbox">
        <input type="checkbox" id="back-end" />
        <label class="label-inline" for="back-end">Back-end Developer</label>
      </div>
      <div class="checkbox">
        <input type="checkbox" id="full-stack" />
        <label class="label-inline" for="full-stack"
          >Full-stack Developer</label
        >
      </div>
      <div class="radio">
        Membership Type: <br />
        <input type="radio" id="silver" name="membership" />
        <label class="label-inline" for="silver">Silver</label>
      </div>
      <div class="radio">
        <input type="radio" id="gold" name="membership" />
        <label class="label-inline" for="gold">Gold</label>
      </div>
      <div class="radio">
        <input type="radio" id="platinum" name="membership" />
        <label class="label-inline" for="platinum">Platinum</label>
      </div>
      <div class="sliders">
        <input type="range" min="2" max="20" value="10" />
      </div>
      <div class="fileinput">
        <input type="file" multiple accept=".jpg, .jpeg, .png, .webp" />
      </div>
      <div class="fieldset">
        <fieldset>
          <legend>Billing Address</legend>
          <input type="text" />
          <input type="text" />
          <input type="text" />
          <input type="text" />
        </fieldset>
        <fieldset>
          <legend>Shipping Address</legend>
          <input type="text" />
          <input type="text" />
          <input type="text" />
          <input type="text" />
        </fieldset>
        <section>
          <h2>Payment</h2>
          <input type="text" />
          <input type="text" />
          <input type="text" />
          <input type="text" />
        </section>
        <input type="hidden" id="user_id" value="usr123" />
      </div>
      <div class="validations">
        <input type="text" required /> <br />
        <br />
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
